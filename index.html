<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데일리 핏 - 스마트 운동 기록기</title>
  <meta name="description" content="매일의 유산소 운동과 근육 강화 운동을 오전, 오후, 저녁 시간대별로 꼼꼼하게 기록하고 관리하는 모던 피트니스 다이어리">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="glass-panel" id="main-header">
      <div>
        <h1>Daily Fit</h1>
        <div class="subtitle">나의 하루 운동을 빛나게 기록합니다</div>
      </div>
    </header>

    <!-- Sidebar (Calendar & Summary) -->
    <aside class="sidebar">
      <!-- Calendar Card -->
      <section class="glass-panel calendar-card" id="calendar-section">
        <div class="calendar-header">
          <h3 id="current-month-year">2026년 6월</h3>
          <div style="display: flex; gap: 8px;">
            <button class="calendar-nav-btn" id="prev-month-btn" aria-label="이전 달">&lt;</button>
            <button class="calendar-nav-btn" id="next-month-btn" aria-label="다음 달">&gt;</button>
          </div>
        </div>
        <div class="calendar-grid" id="calendar-days-grid">
          <!-- Days of Week -->
          <div class="day-name">일</div>
          <div class="day-name">월</div>
          <div class="day-name">화</div>
          <div class="day-name">수</div>
          <div class="day-name">목</div>
          <div class="day-name">금</div>
          <div class="day-name">토</div>
          <!-- Days will be dynamically populated here by app.js -->
        </div>
      </section>

      <!-- Stats Card -->
      <section class="glass-panel stats-card" id="stats-section">
        <h3>이번 달 누적 통계</h3>
        <div class="stat-item">
          <span class="stat-label">총 기록 일수</span>
          <span class="stat-val primary" id="total-days-val">0일</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">총 걸음수</span>
          <span class="stat-val cyan" id="total-steps-val">0보</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">총 자전거타기 시간</span>
          <span class="stat-val cyan" id="total-cycling-val">0분</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">근력 강화 총 횟수</span>
          <span class="stat-val pink" id="total-strength-val">0회</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">최대 달성 기록일</span>
          <span class="stat-val green" id="best-day-val">-</span>
        </div>
      </section>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Daily Progress Overview -->
      <section class="glass-panel daily-overview" id="overview-section">
        <div class="overview-box">
          <div class="overview-label">
            <span>유산소 목표 달성률 (걸음수)</span>
            <span id="cardio-percent">0%</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar cardio" id="cardio-progress-bar"></div>
          </div>
        </div>
        <div class="overview-box">
          <div class="overview-label">
            <span>근육 강화 목표 달성률</span>
            <span id="strength-percent">0%</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar strength" id="strength-progress-bar"></div>
          </div>
        </div>
      </section>

      <!-- Timezone Tabs (Morning, Afternoon, Evening) -->
      <nav class="time-tabs" id="timezone-navigation">
        <button class="tab-btn active" id="tab-morning" data-timezone="morning">
          <span>🌅</span> 오전
        </button>
        <button class="tab-btn" id="tab-afternoon" data-timezone="afternoon">
          <span>☀️</span> 오후
        </button>
        <button class="tab-btn" id="tab-evening" data-timezone="evening">
          <span>🌙</span> 저녁
        </button>
      </nav>

      <!-- Logging Card -->
      <section class="glass-panel log-card" id="log-card-section">
        <div class="log-title-area">
          <h2 id="current-timezone-title">🌅 오전에 한 운동</h2>
          <span class="selected-date-display" id="active-date-display">2026년 06월 23일</span>
        </div>

        <form id="exercise-form" onsubmit="return false;">
          <div class="exercise-sections-grid">
            <!-- Cardio Exercises -->
            <div class="exercise-group cardio-group">
              <h3>🏃‍♂️ 유산소 운동</h3>
              <div class="input-field">
                <label for="input-steps">걸음수</label>
                <div class="input-with-unit">
                  <input type="number" id="input-steps" placeholder="0" min="0">
                  <span class="unit">보</span>
                </div>
              </div>
              <div class="input-field">
                <label for="input-cycling">자전거타기</label>
                <div class="input-with-unit">
                  <input type="number" id="input-cycling" placeholder="0" min="0">
                  <span class="unit">분</span>
                </div>
              </div>
            </div>

            <!-- Strength Exercises -->
            <div class="exercise-group strength-group">
              <h3>💪 근육 강화 운동</h3>
              
              <div class="input-field">
                <label for="input-heel-raise">뒷꿈치들기</label>
                <div class="input-with-unit">
                  <input type="number" id="input-heel-raise" placeholder="0" min="0">
                  <span class="unit">회</span>
                </div>
              </div>

              <div class="input-field">
                <label for="input-leg-raise">앉아서 다리들어올리기</label>
                <div class="input-with-unit">
                  <input type="number" id="input-leg-raise" placeholder="0" min="0">
                  <span class="unit">회</span>
                </div>
              </div>

              <div class="input-field">
                <label for="input-band-exercise">밴드 운동</label>
                <div class="input-with-unit">
                  <input type="number" id="input-band-exercise" placeholder="0" min="0">
                  <span class="unit">회</span>
                </div>
              </div>

              <div class="input-field">
                <label for="input-sit-up">윗몸일으키기</label>
                <div class="input-with-unit">
                  <input type="number" id="input-sit-up" placeholder="0" min="0">
                  <span class="unit">회</span>
                </div>
              </div>
            </div>
          </div>

          <div class="button-row">
            <button type="button" class="btn btn-secondary" id="reset-btn">초기화</button>
            <button type="button" class="btn btn-primary" id="save-btn">기록 저장하기</button>
          </div>
        </form>
      </section>

      <!-- Weekly Trend Chart -->
      <section class="glass-panel trend-card" id="trend-section">
        <h3>주간 운동 트렌드 (최근 7일)</h3>
        <div class="chart-container" id="weekly-chart">
          <!-- Generated dynamically by JavaScript -->
        </div>
        <div class="chart-legend">
          <div class="legend-item">
            <div class="legend-color cardio"></div>
            <span>유산소 (걸음수)</span>
          </div>
          <div class="legend-item">
            <div class="legend-color strength"></div>
            <span>근육 강화 (총 횟수)</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast-message">
    <span>✅</span> <span id="toast-text">기록이 성공적으로 저장되었습니다!</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
